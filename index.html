// ─── PURE SVG CHART COMPONENTS (no external deps) ────────
function SVGLineChart({ data, lines, height=210, yDomain }) {
  const [tooltip, setTooltip] = useState(null);
  const W = 340, H = height, PAD = { top:12, right:16, bottom:28, left:32 };
  const innerW = W - PAD.left - PAD.right;
  const innerH = H - PAD.top - PAD.bottom;

  const allVals = lines.flatMap(l=>data.map(d=>d[l.key]).filter(v=>v!=null));
  const yMin = yDomain ? yDomain[0] : Math.min(...allVals)*0.92;
  const yMax = yDomain ? yDomain[1] : Math.max(...allVals)*1.06;

  const xScale = i => PAD.left + (i/(Math.max(data.length-1,1)))*innerW;
  const yScale = v => PAD.top + innerH - ((v-yMin)/(yMax-yMin))*innerH;

  const yTicks = 4;
  const xLabels = data.map((d,i)=>({ x:xScale(i), label:d.name }));
  const yTickVals = Array.from({length:yTicks+1},(_,i)=>yMin+(yMax-yMin)*(i/yTicks));

  return (
    <div style={{ position:"relative", width:"100%" }}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width:"100%", height:H, display:"block" }}>
        {/* grid lines */}
        {yTickVals.map((v,i)=>(
          <line key={i} x1={PAD.left} y1={yScale(v)} x2={W-PAD.right} y2={yScale(v)}
            stroke="#f0f0f0" strokeWidth={1}/>
        ))}
        {/* y axis labels */}
        {yTickVals.filter((_,i)=>i%2===0).map((v,i)=>(
          <text key={i} x={PAD.left-4} y={yScale(v)+3} textAnchor="end" fontSize={8} fill="#8C9BAB">
            {v%1===0?v:v.toFixed(1)}
          </text>
        ))}
        {/* x axis labels */}
        {xLabels.filter((_,i)=>i===0||i===Math.floor(data.length/2)||i===data.length-1).map((d,i)=>(
          <text key={i} x={d.x} y={H-4} textAnchor="middle" fontSize={8} fill="#8C9BAB">{d.label}</text>
        ))}
        {/* lines */}
        {lines.map(l=>{
          const pts = data.map((d,i)=>d[l.key]!=null?`${xScale(i)},${yScale(d[l.key])}`:null).filter(Boolean);
          if (!pts.length) return null;
          return (
            <g key={l.key}>
              <polyline points={pts.join(" ")} fill="none" stroke={l.color}
                strokeWidth={l.width||1.5} strokeDasharray={l.dash||"none"}
                strokeLinecap="round" strokeLinejoin="round"/>
              {l.dot && data.map((d,i)=>d[l.key]!=null?(
                <circle key={i} cx={xScale(i)} cy={yScale(d[l.key])} r={4}
                  fill={l.color} stroke="#fff" strokeWidth={1.5}
                  style={{ cursor:"pointer" }}
                  onMouseEnter={e=>setTooltip({x:xScale(i),y:yScale(d[l.key]),val:d[l.key],name:d.name,label:l.label})}
                  onMouseLeave={()=>setTooltip(null)}/>
              ):null)}
            </g>
          );
        })}
        {/* tooltip */}
        {tooltip && (
          <g>
            <rect x={Math.min(tooltip.x-30,W-80)} y={tooltip.y-30} width={72} height={22} rx={4}
              fill="#2C3E50" opacity={0.9}/>
            <text x={Math.min(tooltip.x-30,W-80)+36} y={tooltip.y-15} textAnchor="middle" fontSize={9} fill="#fff">
              {tooltip.name}: {typeof tooltip.val==="number"?tooltip.val.toFixed(tooltip.val>10?1:2):tooltip.val}
            </text>
          </g>
        )}
      </svg>
      {/* legend */}
      <div style={{ display:"flex", gap:12, justifyContent:"center", flexWrap:"wrap", marginTop:4 }}>
        {lines.map(l=>(
          <div key={l.key} style={{ display:"flex", alignItems:"center", gap:4, fontSize:9, color:"#8C9BAB" }}>
            <svg width={20} height={8}>
              <line x1={0} y1={4} x2={20} y2={4} stroke={l.color} strokeWidth={l.width||1.5}
                strokeDasharray={l.dash||"none"}/>
              {l.dot && <circle cx={10} cy={4} r={3} fill={l.color}/>}
            </svg>
            {l.label}
          </div>
        ))}
      </div>
    </div>
  );
}

function SVGMiniBarChart({ data, height=88 }) {
  const W = 300, H = height;
  const PAD = { top:6, right:4, bottom:24, left:4 };
  const innerW = W - PAD.left - PAD.right;
  const innerH = H - PAD.top - PAD.bottom;
  const vals = data.map(d=>d.v);
  const maxV = Math.max(...vals, 1)*1.1;
  const barW = Math.max(4, (innerW/data.length)*0.8);
  const gap = innerW/data.length;
  const avgVal = data[0]?.avg;
  const maxI = vals.indexOf(Math.max(...vals));

  return (
    <div style={{ display:"flex", flexDirection:"column", alignItems:"center" }}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width:"100%", height:H, display:"block" }}>
        {/* avg line */}
        {avgVal && (
          <>
            <line x1={PAD.left} y1={PAD.top+innerH-(avgVal/maxV)*innerH}
              x2={W-PAD.right} y2={PAD.top+innerH-(avgVal/maxV)*innerH}
              stroke="#E8967A" strokeDasharray="4 3" strokeWidth={1.5}/>
            <text x={W-PAD.right-2} y={PAD.top+innerH-(avgVal/maxV)*innerH-3} textAnchor="end" fontSize={7} fill="#E8967A" fontWeight="600">
              avg:{Math.round(avgVal)}
            </text>
          </>
        )}
        {data.map((d,i)=>{
          const bh = Math.max(3,(d.v/maxV)*innerH);
          const x = PAD.left + i*gap + gap/2 - barW/2;
          const y = PAD.top + innerH - bh;
          const fillColor = d.today ? "#F5A623" : d.good ? "#7C9A7E" : "#E8967A";
          return (
            <g key={i}>
              <rect x={x} y={y} width={barW} height={bh} rx={2} fill={fillColor}/>
              {i===maxI && (
                <text x={x+barW/2} y={y-3} textAnchor="middle" fontSize={7} fill={fillColor} fontWeight="700">
                  {d.v}
                </text>
              )}
              <text x={x+barW/2} y={H-6} textAnchor="middle" fontSize={8} fill="#8C9BAB">{d.name}</text>
            </g>
          );
        })}
      </svg>
      <div style={{ display:"flex", gap:8, justifyContent:"center", marginTop:2 }}>
        {[["#7C9A7E","Met"],["#E8967A","Missed"],["#F5A623","Today"]].map(([c,l])=>(
          <div key={l} style={{ display:"flex", alignItems:"center", gap:3, fontSize:8, color:"#8C9BAB" }}>
            <div style={{ width:6, height:6, borderRadius:"50%", background:c }}/>
            {l}
          </div>
        ))}
      </div>
    </div>
  );
}

const DOB = new Date("2025-12-11");
const EDD = new Date("2026-02-15");

function getChronologicalAge() {
  const today = new Date();
  const diff = today - DOB;
  const totalDays = Math.floor(diff / 86400000);
  const months = Math.floor(totalDays / 30.44);
  const days = Math.floor(totalDays - months * 30.44);
  return { months, days, totalDays };
}

function getCorrectedAge() {
  const today = new Date();
  const diff = today - EDD;
  if (diff < 0) return { weeks: 0, days: 0, totalDays: 0 };
  const totalDays = Math.floor(diff / 86400000);
  const weeks = Math.floor(totalDays / 7);
  const days = totalDays % 7;
  return { weeks, days, totalDays };
}

// ─── AUDIO ENGINE ─────────────────────────────────────────
function useAudioEngine() {
  const ctx    = useRef(null);
  const nodes  = useRef({});
  const timer  = useRef(null);
  const [playing, setPlaying] = useState(null);

  const getCtx = () => {
    if (!ctx.current) ctx.current = new (window.AudioContext || window.webkitAudioContext)();
    return ctx.current;
  };

  const stopAll = useCallback(() => {
    const n = nodes.current;
    if (n.src)       { try { n.src.stop(); } catch{} }
    if (n.osc)       { try { n.osc.stop(); } catch{} }
    if (n.osc2)      { try { n.osc2.stop(); } catch{} }
    if (n.osc3)      { try { n.osc3.stop(); } catch{} }
    if (n.interval)  clearInterval(n.interval);
    if (n.birdTimers) n.birdTimers.forEach(t=>clearTimeout(t));
    nodes.current = {};
    setPlaying(null);
    if (timer.current) clearTimeout(timer.current);
  }, []);

  const playSound = useCallback((type) => {
    if (playing === type) { stopAll(); return; }
    stopAll();
    const ac = getCtx();
    if (ac.state === "suspended") ac.resume();

    const master = ac.createGain();
    master.gain.setValueAtTime(0.4, ac.currentTime);
    master.connect(ac.destination);

    const makeNoise = (freq, q, btype) => {
      const sz = ac.sampleRate * 4;
      const buf = ac.createBuffer(1, sz, ac.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < sz; i++) d[i] = Math.random() * 2 - 1;
      const src = ac.createBufferSource();
      src.buffer = buf; src.loop = true;
      if (freq) {
        const f = ac.createBiquadFilter();
        f.type = btype || "lowpass"; f.frequency.value = freq;
        if (q) f.Q.value = q;
        src.connect(f); f.connect(master);
      } else { src.connect(master); }
      src.start();
      nodes.current.src = src;
    };

    if (type === "white") {
      makeNoise(null);
    } else if (type === "ocean") {
      makeNoise(340);
      // add gentle wave modulation
      const lfo = ac.createOscillator();
      const lfoGain = ac.createGain();
      lfo.frequency.value = 0.1;
      lfoGain.gain.value = 60;
      lfo.connect(lfoGain);
      // modulate the filter — approximate by connecting to master gain lightly
      lfo.start();
      nodes.current.osc = lfo;
    } else if (type === "birds") {
      // Fix 13: 3 sine oscillators at bird frequencies, gentle chirps
      const master2 = master; // use master gain at 0.12
      master2.gain.setValueAtTime(0.12, ac.currentTime);
      const birdTimers = [];
      const chirpOsc = (freq, delayMs) => {
        const tid = setTimeout(() => {
          if (!nodes.current.master) return;
          const o = ac.createOscillator();
          const g = ac.createGain();
          const now = ac.currentTime;
          o.type = "sine";
          o.frequency.setValueAtTime(freq, now);
          o.frequency.linearRampToValueAtTime(freq + 150, now + 0.06);
          // Attack 10ms, hold 60ms, release 40ms
          g.gain.setValueAtTime(0, now);
          g.gain.linearRampToValueAtTime(0.8, now + 0.01);
          g.gain.setValueAtTime(0.8, now + 0.07);
          g.gain.linearRampToValueAtTime(0, now + 0.11);
          o.connect(g); g.connect(master2);
          o.start(now); o.stop(now + 0.12);
        }, delayMs);
        birdTimers.push(tid);
      };
      const scheduleChirps = () => {
        if (!nodes.current.master) return;
        const freqs = [3000, 3400, 3800];
        freqs.forEach(freq => {
          if (Math.random() > 0.3) {
            chirpOsc(freq, Math.random() * 400);
          }
        });
        const interval = 600 + Math.random() * 1400;
        const t = setTimeout(scheduleChirps, interval);
        birdTimers.push(t);
      };
      scheduleChirps();
      nodes.current.birdTimers = birdTimers;
    } else if (type === "om") {
      // 136.1Hz Om frequency with harmonics
      const freqs = [136.1, 272.2, 408.3];
      const gains = [0.5, 0.25, 0.12];
      const oscs = freqs.map((f, i) => {
        const o = ac.createOscillator();
        const g = ac.createGain();
        o.type = "sine";
        o.frequency.value = f;
        g.gain.setValueAtTime(0, ac.currentTime);
        g.gain.linearRampToValueAtTime(gains[i], ac.currentTime + 2.5);
        o.connect(g); g.connect(master);
        o.start();
        return { osc: o, gain: g };
      });
      // Gentle slow tremolo
      const lfo = ac.createOscillator();
      const lfoG = ac.createGain();
      lfo.frequency.value = 0.05;
      lfoG.gain.value = 0.04;
      lfo.connect(lfoG); lfoG.connect(master.gain);
      lfo.start();
      nodes.current.osc  = oscs[0].osc;
      nodes.current.osc2 = oscs[1].osc;
      nodes.current.osc3 = oscs[2].osc;
      nodes.current._omLfo = lfo;
    }
    nodes.current.master = master;
    setPlaying(type);
    timer.current = setTimeout(stopAll, 600000);
  }, [playing, stopAll]);

  const setVolume = useCallback((v) => {
    if (nodes.current.master) {
      const ac = getCtx();
      nodes.current.master.gain.setValueAtTime(v, ac.currentTime);
    }
  }, []);

  return { playing, playSound, setVolume };
}

// ─── TOAST ────────────────────────────────────────────────
function Toast({ message, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 2800); return () => clearTimeout(t); }, []);
  return (
    <div style={{
      position:"fixed", bottom:90, left:"50%", transform:"translateX(-50%)",
      background:"#2C3E50", color:"#fff", padding:"10px 22px", borderRadius:50,
      fontSize:14, fontWeight:600, zIndex:9999, whiteSpace:"nowrap",
      boxShadow:"0 4px 20px rgba(0,0,0,0.2)", animation:"fadeUp 0.3s ease"
    }}>{message}</div>
  );
}

function TimePillSelector({ value, onChange }) {

  const now = new Date();
  const fmt = d => d.toTimeString().slice(0,5);
  const options = [
    { label:"Just now", value: fmt(now) },
    { label:"15m ago",  value: fmt(new Date(now-15*60000)) },

    <div>

            background: (!custom && sel===o.value) || (custom && o.value==="custom") ? "#7C9A7E" : "#f0f0f0",

// ─── VOICE LOG (Fix 1: complete rebuild) ──────────────────
function VoiceLog({ onClose, onLog, logs, showToast, openSheet }) {
  const [status,       setStatus]       = useState("listening");
  const [transcript,   setTranscript]   = useState("");
  const [interimText,  setInterimText]  = useState("");
  const [parsed,       setParsed]       = useState(null);
  const [searchResult, setSearchResult] = useState(null);
  const [errorMsg,     setErrorMsg]     = useState("");
  const [hint,         setHint]         = useState(0);
  const recRef     = useRef(null);
  const minReady   = useRef(false);
  const minTimer   = useRef(null);
  const timeoutRef = useRef(null);

  const hints = [
    'Say: "Fed Maanvik 60ml breastmilk"',
    'Say: "Maanvik slept 2 hours settled"',
    'Say: "Diaper change, wet"',
    'Say: "When was the last feed?"',
    'Say: "Gave vitamin D drops"',
  ];

  useEffect(()=>{
    const t = setInterval(()=>setHint(h=>(h+1)%hints.length), 2500);
    return ()=>clearInterval(t);
  },[]);

  const resetAndClose = () => {
    try { recRef.current?.abort(); } catch{}
    recRef.current = null;
    minReady.current = false;
    clearTimeout(minTimer.current);
    clearTimeout(timeoutRef.current);
    onClose();
  };

  const startRecognition = () => {
    // Abort any existing instance first
    try { recRef.current?.abort(); } catch{}
    recRef.current = null;
    minReady.current = false;
    clearTimeout(minTimer.current);
    clearTimeout(timeoutRef.current);
    setTranscript(""); setInterimText(""); setParsed(null); setSearchResult(null); setErrorMsg("");
    setStatus("listening");

    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { setStatus("unsupported"); return; }

    // Wait 400ms then create fresh instance
    setTimeout(()=>{
      const r = new SR();
      r.continuous = false;
      r.interimResults = true;
      r.lang = "en-IN";
      r.maxAlternatives = 3;

      r.onresult = (e) => {
        // Show interim transcript in real time
        const interim = Array.from(e.results)
          .filter(r=>!r.isFinal).map(r=>r[0].transcript).join(" ");
        const final = Array.from(e.results)
          .filter(r=>r.isFinal);
        if (interim) setInterimText(interim);

        if (final.length > 0 && minReady.current) {
          // Pick best alternative across all final results
          let bestText = "", bestConf = -1;
          final.forEach(res=>{
            Array.from({length:res.length},(_,i)=>res[i]).forEach(alt=>{
              if (alt.confidence > bestConf) { bestConf = alt.confidence; bestText = alt.transcript; }
            });
          });
          if (!bestText) bestText = final[0][0].transcript;
          setTranscript(bestText);
          setInterimText("");
          setStatus("processing");
          clearTimeout(timeoutRef.current);
          processVoice(bestText);
        }
      };

      r.onerror = (e) => {
        const msgs = {
          "no-speech": "Didn't hear anything — tap to try again",
          "network":   "Network issue — try again",
          "not-allowed":"Microphone access needed — please allow in browser settings",
        };
        setErrorMsg(msgs[e.error] || "Something went wrong — tap to try again");
        setStatus("error");
      };

      r.onend = () => {
        // If still listening and nothing processed, set timeout
        if (status === "listening") {
          clearTimeout(timeoutRef.current);
          timeoutRef.current = setTimeout(()=>setStatus("timeout"), 500);
        }
      };

      recRef.current = r;
      try { r.start(); } catch(e) { setStatus("error"); setErrorMsg("Could not start microphone"); }

      // 5 second minimum before acting on result
      minTimer.current = setTimeout(()=>{ minReady.current = true; }, 5000);
      // 15s total timeout
      timeoutRef.current = setTimeout(()=>{ if(status==="listening") setStatus("timeout"); }, 15000);
    }, 400);
  };

  useEffect(()=>{ startRecognition(); return ()=>{ try{recRef.current?.abort();}catch{} clearTimeout(minTimer.current); clearTimeout(timeoutRef.current); }; },[]);

  const processVoice = (text) => {
    const l = text.toLowerCase();
    if (/\b(when|last|how much|how many|show|what|find|tell me)\b/.test(l)) {
      handleSearch(l); return;
    }
    parseVoice(l, text);
  };

  const handleSearch = (l) => {
    const feedLogs   = logs.filter(x=>x.type==="feed");
    const sleepLogs  = logs.filter(x=>x.type==="sleep");
    const diaperLogs = logs.filter(x=>x.type==="diaper");
    let result = null;
    if (/feed|milk|breast|formula/.test(l)) {
      if (feedLogs.length > 0) {
        const last = feedLogs[feedLogs.length-1];
        const minsAgo = last._ts ? Math.round((Date.now()-last._ts)/60000) : 45;
        const totalMl = feedLogs.reduce((s,f)=>s+(parseFloat(f.volume)||0),0);
        result = /how much|total/.test(l)
          ? `🍼 ${totalMl}ml total across ${feedLogs.length} feeds today`
          : `🍼 Last feed: ${last.volume}ml ${last.feedType}, ${minsAgo<60?minsAgo+"m":Math.round(minsAgo/60)+"hr"} ago`;
      } else result = "🍼 No feeds logged yet today";
    } else if (/sleep|nap/.test(l)) {
      const totalMin = sleepLogs.reduce((s,sl)=>{
        if(sl.end==="now") return s+60;
        const [sh,sm]=sl.start.split(":").map(Number);
        const [eh,em]=sl.end.split(":").map(Number);
        return s+Math.max(0,(eh*60+em)-(sh*60+sm));
      },0);
      result = `💤 ${Math.floor(totalMin/60)}h ${totalMin%60}m sleep today (${sleepLogs.length} sessions)`;
    } else if (/diaper|nappy|pee|poop/.test(l)) {
      result = `🩲 ${diaperLogs.length} diaper changes logged today`;
    } else {
      result = "🔍 Tap any log entry in Today's timeline to see details";
    }
    setSearchResult(result); setStatus("search");
  };

  const parseVoice = (l, raw) => {
    let result = null;

    // SLEEP — keywords: sleep, slept, nap, napped, resting, rested
    if (/\b(sleep|slept|nap|napped|resting|rested)\b/.test(l)) {
      const hrMatch  = l.match(/(\d+)\s*(?:hr|hrs|hour|hours)/);
      const minMatch = l.match(/(\d+)\s*(?:min|mins|minute|minutes)/);
      const hrs  = hrMatch  ? parseInt(hrMatch[1])  : 0;
      const mins = minMatch ? parseInt(minMatch[1]) : 0;
      if (!hrs && !mins) { openSheet("sleep"); resetAndClose(); return; }
      const totalMins = hrs*60 + mins;
      const endH = new Date();
      const startMs = Date.now() - totalMins*60000;
      const startTime = new Date(startMs).toTimeString().slice(0,5);
      const endTime   = endH.toTimeString().slice(0,5);
      const quality = /unsettl|restless|fuss/.test(l) ? "unsettled" : "settled";
      const label = hrs && mins ? `${hrs}hr ${mins}min` : hrs ? `${hrs}hr` : `${mins}min`;
      result = { type:"sleep", start:startTime, end:endTime, quality, display:`💤 Sleep — ${label}, ${quality}` };
    }
    // FEED — keywords: fed, feed, feeding, milk, breastfeed, formula, nurse, nursed
    else if (/\b(fed|feed|feeding|milk|breastfeed|formula|nurse|nursed)\b/.test(l)) {
      const ml = l.match(/(\d+)\s*(?:ml|milliliter)/)?.[1] || null;
      const ft = /formula/.test(l) ? "formula" : "breastmilk";
      if (!ml) { openSheet("feed"); resetAndClose(); return; }
      result = { type:"feed", feedType:ft, volume:ml, display:`🍼 Feed — ${ml}ml, ${ft==="breastmilk"?"Breastmilk":"Formula"}` };
    }
    // DIAPER — keywords: diaper, nappy, pee, poop, wet, soiled, potty, change
    else if (/\b(diaper|nappy|pee|poop|wet|soiled|potty|change)\b/.test(l)) {
      const hasPoop = /poop|soiled|potty/.test(l);
      const hasPee  = /pee|wet/.test(l);
      const dt = hasPoop && hasPee ? "both" : hasPoop ? "soiled" : "wet";
      const wetness = /heavy/.test(l)?"heavy":/light/.test(l)?"light":"normal";
      result = { type:"diaper", diaperType:dt, wetness, display:`🩲 Diaper — ${dt}${dt!=="soiled"?`, ${wetness}`:""}` };
    }
    // MEDICINE — keywords: medicine, medication, vitamin, drops, calcium, iron, dose, gave
    else if (/\b(medicine|medication|vitamin|drops|calcium|iron|dose|gave)\b/.test(l)) {
      const medId = /vitamin\s*d/i.test(raw)?"vd3":/vitamin\s*a/i.test(raw)?"vaz":/iron|tonoferron/i.test(raw)?"iron":"calc";
      const medName = MEDS.find(m=>m.id===medId)?.name || "Vitamin D3";
      result = { type:"med", medId, medName, display:`💊 ${medName}` };
    }

    if (result) { setParsed(result); setStatus("preview"); }
    else setStatus("unparseable");
  };

  const retryFn = () => startRecognition();

  const overlay = { position:"fixed", inset:0, background:"rgba(20,28,38,0.88)",
    zIndex:2000, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
    backdropFilter:"blur(10px)" };

  return (
    <div style={overlay}>
      <button onClick={resetAndClose} style={{ position:"absolute", top:24, right:24, background:"rgba(255,255,255,0.15)", border:"none", borderRadius:"50%", width:40, height:40, color:"#fff", fontSize:18, cursor:"pointer" }}>✕</button>

      {status==="listening" && (
        <>
          <div style={{ display:"flex", alignItems:"flex-end", gap:5, height:64, marginBottom:28 }}>

// ─── MINI CHAT (Fix 9: proper conversation history) ──────
function NestiChat({ onClose, age, corr }) {
  const [chatHistory, setChatHistory] = useState([
    { role:"assistant", content:"Hi! Tell me what's on your mind about Maanvik 🌿" }
  ]);
  const [displayMessages, setDisplayMessages] = useState([
    { role:"nesti", text:"Hi! Tell me what's on your mind about Maanvik 🌿" }
  ]);
  const [input,     setInput]     = useState("");
  const [busy,      setBusy]      = useState(false);
  const [userCount, setUserCount] = useState(0);
  const [logItems,  setLogItems]  = useState(null);
  const [checked,   setChecked]   = useState({});
  const bottomRef = useRef(null);

  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:"smooth"}); },[displayMessages]);

  const send = async () => {
    if (!input.trim() || busy) return;
    const userMsg = input.trim();
    setInput("");
    const newCount = userCount + 1;
    setUserCount(newCount);

    const newUserEntry = { role:"user", content:userMsg };
    const updatedHistory = [...chatHistory, newUserEntry];
    setChatHistory(updatedHistory);
    setDisplayMessages(m=>[...m, { role:"user", text:userMsg }]);
    setBusy(true);

    const sys = `You are nesti, a warm supportive friend who is also a paediatrician. You are having a conversation with Maanvik's parent. Maanvik is ${age.months} months ${age.days} days old (${corr.weeks}w ${corr.days}d corrected), premature (30+4 weeks). Listen warmly and ask ONE gentle follow-up question per response. Keep each response under 60 words. Be conversational, not clinical. After the 3rd user message, naturally wrap up and identify any log-worthy observations. At the END of every response, on a new line starting with "LOGWORTHY:", list any log-worthy facts pipe-separated, or write "LOGWORTHY:none".`;
    const fb = `That's really helpful to know. How long has Maanvik been showing this? 🌿\n\nLOGWORTHY:none`;

    try {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:300,
          system:sys,
          messages: updatedHistory
        })
      });
      const d = await res.json();
      const resp = d.content?.[0]?.text || fb;
      const parts = resp.split(/\nLOGWORTHY:/i);
      const cleanResp = parts[0].trim();
      const logLine = parts[1]?.trim();
      const items = logLine && logLine!=="none" ? logLine.split("|").filter(Boolean) : [];

      const assistantEntry = { role:"assistant", content:cleanResp };
      setChatHistory(h=>[...h, assistantEntry]);
      setDisplayMessages(m=>[...m, { role:"nesti", text:cleanResp }]);
      if (items.length > 0) setLogItems(items);
      else if (newCount >= 3 && !logItems) setLogItems([]);
    } catch {
      const cleanFb = fb.split(/\nLOGWORTHY:/i)[0].trim();
      setChatHistory(h=>[...h, { role:"assistant", content:cleanFb }]);
      setDisplayMessages(m=>[...m, { role:"nesti", text:cleanFb }]);
    }
    setBusy(false);
  };

  return (
    <div style={{ position:"fixed", inset:0, zIndex:1100, display:"flex", flexDirection:"column", justifyContent:"flex-end" }}>
      <div style={{ position:"absolute", inset:0, background:"rgba(0,0,0,0.5)", backdropFilter:"blur(2px)" }} onClick={()=>onClose(null)}/>
      <div className="sheet-enter" style={{ position:"relative", background:"#FDFCFA", borderRadius:"24px 24px 0 0", height:"82vh", display:"flex", flexDirection:"column", maxWidth:430, width:"100%", margin:"0 auto" }}>
        <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"18px 20px 12px", borderBottom:"1px solid #f0f0f0" }}>
          <div>
            <div style={{ fontSize:16, fontWeight:800, color:"#2C3E50" }}>Chat with nesti 🌿</div>
            <div style={{ fontSize:11, color:"#8C9BAB" }}>Your AI paediatric companion</div>
          </div>
          <div style={{ display:"flex", gap:8, alignItems:"center" }}>
            {userCount >= 3 && <button onClick={()=>{ if(!logItems) setLogItems([]); }} style={{ background:"#f0f7f0", color:"#7C9A7E", border:"none", borderRadius:50, padding:"6px 12px", fontSize:12, fontWeight:700, cursor:"pointer" }}>Done</button>}
            <button onClick={()=>onClose(null)} style={{ background:"#f0f0f0", border:"none", borderRadius:"50%", width:32, height:32, cursor:"pointer", fontSize:15, display:"flex", alignItems:"center", justifyContent:"center" }}>✕</button>
          </div>
        </div>
        <div style={{ flex:1, overflowY:"auto", padding:"16px 16px 8px", display:"flex", flexDirection:"column", gap:10 }}>
          {displayMessages.map((m,i)=>(
            <div key={i} style={{ display:"flex", justifyContent:m.role==="user"?"flex-end":"flex-start" }}>
              <div style={{
                maxWidth:"80%", padding:"10px 14px",
                borderRadius:m.role==="user"?"18px 18px 4px 18px":"18px 18px 18px 4px",
                background:m.role==="user"?"#7C9A7E":"#fff",
                color:m.role==="user"?"#fff":"#2C3E50",
                fontSize:14, lineHeight:1.5, fontWeight:m.role==="user"?600:400,
                boxShadow:"0 1px 8px rgba(0,0,0,0.06)"
              }}>{m.text}</div>
            </div>
          ))}
          {busy && (
            <div style={{ display:"flex", gap:5, padding:"10px 14px", background:"#fff", borderRadius:"18px 18px 18px 4px", width:60, boxShadow:"0 1px 8px rgba(0,0,0,0.06)" }}>
              {[0,1,2].map(i=><div key={i} style={{ width:6, height:6, borderRadius:"50%", background:"#8C9BAB", animation:"skeleton 1s ease infinite", animationDelay:`${i*0.2}s` }}/>)}
            </div>
          )}
          {logItems !== null && (
            <div style={{ background:"#f0f7f0", borderRadius:14, padding:"14px", marginTop:8, border:"1.5px solid #7C9A7E33" }}>
              <div style={{ fontWeight:700, fontSize:13, color:"#2C3E50", marginBottom:10 }}>Here's what I noted from our chat 📝</div>
              {logItems.length === 0 && <div style={{ fontSize:13, color:"#8C9BAB" }}>Nothing specific to log — that was a great chat! 🌿</div>}
              {logItems.map((item,i)=>(
                <label key={i} style={{ display:"flex", alignItems:"flex-start", gap:8, marginBottom:8, cursor:"pointer" }}>
                  <input type="checkbox" checked={!!checked[i]} onChange={e=>setChecked(c=>({...c,[i]:e.target.checked}))} style={{ marginTop:2, accentColor:"#7C9A7E" }}/>
                  <span style={{ fontSize:13, color:"#2C3E50", lineHeight:1.5 }}>{item}</span>
                </label>
              ))}
              {logItems.length > 0 && (
                <button onClick={()=>onClose("Observations saved to Maanvik's log ✓")} style={{ ...S.saveBtn, marginTop:6, padding:"11px", fontSize:14 }}>Save selected to Maanvik's log</button>
              )}
            </div>
          )}
          <div ref={bottomRef}/>
        </div>
        <div style={{ padding:"10px 14px 20px", borderTop:"1px solid #f0f0f0", display:"flex", gap:8, background:"#fff" }}>
          <input value={input} onChange={e=>setInput(e.target.value)}
            onKeyDown={e=>{ if(e.key==="Enter") send(); }}
            placeholder="Type something..." disabled={busy}
            style={{ ...S.input, flex:1, fontSize:14, padding:"11px 14px" }}/>
          <button onClick={send} disabled={!input.trim()||busy} style={{
            width:44, height:44, borderRadius:"50%", background:input.trim()?"#7C9A7E":"#e8e8e8",
            border:"none", cursor:input.trim()?"pointer":"default", color:"#fff", fontSize:18,
            display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0
          }}>→</button>
        </div>
      </div>
    </div>
  );
}

function TodayScreen({ logs, onLog, onDeleteLog, showToast, clinicNum, setClinicNum }) {
  const [sheet,        setSheet]        = useState(null);
  const [showAll,      setShowAll]      = useState(false);
  const [obsText,      setObsText]      = useState(null);
  const [obsLoading,   setObsLoading]   = useState(true);
  const [obsCollapsed, setObsCollapsed] = useState(false);
  const [chatOpen,     setChatOpen]     = useState(false);
  const [confetti,     setConfetti]     = useState(false);
  const [vol,          setVol]          = useState(0.4);
  const [waSheet,      setWaSheet]      = useState(false);
  const [deleteConfirm,setDeleteConfirm]= useState(null); // id to confirm delete
  const [clinicSheet2, setClinicSheet2] = useState(false); // Fix 6: call clinic sheet
  const [tempClinic,   setTempClinic]   = useState("");
  const { playing, playSound, setVolume } = useAudioEngine();
  const logsRef = useRef(logs);
  useEffect(()=>{ logsRef.current = logs; },[logs]);

  const age  = getChronologicalAge();
  const corr = getCorrectedAge();
  const hour = new Date().getHours();

  const greeting = hour>=5&&hour<12 ? "Good morning, Maanvik's Dad ☀️"
                 : hour>=12&&hour<17 ? "Good afternoon, Maanvik's Dad 🌤"
                 : hour>=17&&hour<21 ? "Good evening, Maanvik's Dad 🌙"
                 : "You're up late, Maanvik's Dad 🌙 — hope he's sleeping well";

  const feeds   = logs.filter(l=>l.type==="feed");
  const sleeps  = logs.filter(l=>l.type==="sleep");
  const diapers = logs.filter(l=>l.type==="diaper");
  const meds    = logs.filter(l=>l.type==="med");

  const totalMl = feeds.reduce((s,f)=>s+(parseFloat(f.volume)||0),0);
  const totalSleepMin = sleeps.reduce((s,sl)=>{
    if(sl.end==="now") return s+60;
    const [sh,sm]=sl.start.split(":").map(Number);
    const [eh,em]=sl.end.split(":").map(Number);
    return s+Math.max(0,(eh*60+em)-(sh*60+sm));
  },0);
  const sleepHrs  = totalSleepMin/60;
  const feedPct   = Math.min(100,Math.round((totalMl/560)*100));
  const sleepPct  = Math.min(100,Math.round((sleepHrs/14)*100));
  const diaperPct = Math.min(100,Math.round((diapers.length/6)*100));
  const medPct    = Math.min(100,Math.round((meds.length/6)*100));
  const allGreen  = feedPct>=100 && sleepPct>=100 && diaperPct>=100 && medPct>=100;

  useEffect(()=>{ if(allGreen){ setConfetti(true); setTimeout(()=>setConfetti(false),3200); } },[allGreen]);

  const loadObservations = useCallback(() => {
    setObsLoading(true); setObsText(null);
    const curLogs   = logsRef.current;
    const curFeeds  = curLogs.filter(l=>l.type==="feed");
    const curSleeps = curLogs.filter(l=>l.type==="sleep");
    const curDiapers= curLogs.filter(l=>l.type==="diaper");
    const curMeds   = curLogs.filter(l=>l.type==="med");
    const curMl     = curFeeds.reduce((s,f)=>s+(parseFloat(f.volume)||0),0);
    const curSleepMin = curSleeps.reduce((s,sl)=>{
      if(sl.end==="now") return s+60;
      const [sh,sm]=sl.start.split(":").map(Number);
      const [eh,em]=sl.end.split(":").map(Number);
      return s+Math.max(0,(eh*60+em)-(sh*60+sm));
    },0);
    const curSleepHrs = curSleepMin/60;
    const curFeedPct  = Math.min(100,Math.round((curMl/560)*100));
    const sys = `You are nesti, a warm AI paediatric care companion for parents of Maanvik, a premature baby born at 30+4 weeks, now ${age.months} months ${age.days} days old (${corr.weeks} weeks ${corr.days} days corrected). Analyse today's logs. Respond in this EXACT format:\n🍼 Feeding\n• [bullet]\n💤 Sleep\n• [bullet]\n🌟 Overall\n• [bullet]\n[one warm italic encouraging line]\nMax 10 lines. Be specific to actual numbers.`;
    const msg = `Feeds: ${curMl}ml (${curFeeds.length} sessions). Sleep: ${curSleepHrs.toFixed(1)}hrs. Diapers: ${curDiapers.length}. Meds: ${curMeds.length}.`;
    const fb  = `🍼 Feeding\n• ${curMl}ml logged so far — ${curFeedPct<50?"building toward":"on track for"} daily target\n• Good feed spacing observed\n\n💤 Sleep\n• ${curSleepHrs.toFixed(1)}hrs logged — steady progress\n• Settled quality is encouraging\n\n🌟 Overall\n• Great rhythm today — keep going!\n\n*You're doing beautifully, Maanvik's Dad. Every log matters. 🌿*`;
    callNestiAI(sys, msg, fb).then(r=>{ setObsText(r); setObsLoading(false); });
  }, [age.months, age.days, corr.weeks, corr.days]);

  useEffect(()=>{ loadObservations(); },[]);

  // Fix 3: nudge re-evaluates on every log change via useMemo-like inline compute
  const evaluateNudge = (feeds, sleeps, diapers, meds, totalMl, sleepHrs, hour) => {
    const expectedMl      = (hour/24)*560*0.5;
    const expectedSleep   = (hour/24)*14;
    const expectedDiapers = Math.floor((hour/24)*6);
    const hasSoiled       = diapers.some(d=>d.diaperType==="soiled"||d.diaperType==="both");
    if (!hasSoiled && diapers.length > 0) return { level:"red",   icon:"🩲", title:"No soiled diaper in 24hrs", sub:"Worth keeping an eye on", action:"diaper" };
    if (totalMl < expectedMl*0.5 && hour>6) return { level:"red",   icon:"🍼", title:`Only ${totalMl}ml logged — ${Math.round(expectedMl)}ml expected by now`, sub:"Feed Maanvik now", action:"feed" };
    if (sleepHrs < 14*0.3 && hour>=20)      return { level:"red",   icon:"💤", title:`Only ${sleepHrs.toFixed(1)}hrs sleep logged`, sub:"WHO target: 14hrs — running very low", action:"sleep" };
    if (totalMl < expectedMl && hour>8)     return { level:"amber", icon:"🍼", title:`${totalMl}ml logged, ~${Math.round(expectedMl)}ml expected by ${hour}:00`, sub:"Feeding a little behind schedule", action:"feed" };
    if (sleepHrs < expectedSleep*0.5 && hour>=18) return { level:"amber", icon:"💤", title:`${sleepHrs.toFixed(1)}hrs logged, ${expectedSleep.toFixed(1)}hrs expected by now`, sub:"Sleep is running a bit low", action:"sleep" };
    if (diapers.length < expectedDiapers-1 && hour>10) return { level:"amber", icon:"🩲", title:`${diapers.length} diapers vs ${expectedDiapers} expected`, sub:"A couple behind expected count", action:"diaper" };
    if (meds.length < 4 && hour>=18)        return { level:"amber", icon:"💊", title:`${6-meds.length} medicine doses still pending today`, sub:"Tap to log a dose", action:"med" };
    return { level:"green", icon:"🌿", title:"Maanvik's doing great today!", sub:"All targets on track", action:null };
  };
  const nudge = evaluateNudge(feeds, sleeps, diapers, meds, totalMl, sleepHrs, hour);

  const nudgeColors = {
    red:   { border:"#E05C5C", bg:"#FEF2F2", iconBg:"#fce8e8", text:"#c0392b" },
    amber: { border:"#F5A623", bg:"#FFFBF0", iconBg:"#FFF3D0", text:"#8a5700" },

  const wamsg = `Hi Dr. Khanna, sharing Maanvik's update:\n• Age: ${age.months} months ${age.days} days (${corr.weeks}w ${corr.days}d corrected)\n• Weight: 4.70kg | Height: 59cm | HC: 37cm\n• Today's feeds: ${totalMl}ml total (${feeds.length} feeds)\n• Sleep: ${sleepHrs.toFixed(1)}hrs\n• Diapers: ${diapers.length} changes\n• Medicines: ${meds.length} of 6 doses given\n• Any concerns: [tap to add]`;

  const sounds = [
    {id:"ocean",icon:"🌊",label:"Ocean"},
    {id:"white",icon:"🤍",label:"White"},
    {id:"birds",icon:"🐦",label:"Birds"},
    {id:"om",   icon:"🕉",label:"Om"},
  ];

  // Fix 2: 7-day bar data
  const makeBarData = (key, target) => TREND7[key].map((v,i)=>({
    name: DAYS7[i], v,
    today: i === TREND7[key].length-1,
    good: key==="feed"?(v>=target):key==="sleep"?(v>=target):key==="diaper"?(v>=4):v>=5
  }));
  const feedAvg7 = TREND7.feed.slice(0,6).reduce((a,b)=>a+b,0)/6;

// WHO reference tables (boys) — 50th percentile
const WHO_W_WEEKS = {0:3.35,1:3.44,2:3.63,3:3.82,4:4.00,5:4.18,6:4.35,8:4.67,10:4.97,12:5.23,16:5.71};
const WHO_W_MONTHS= {0:3.35,1:4.47,2:5.57,3:6.37,4:7.00,5:7.51,6:7.93};
const WHO_H_WEEKS = {0:49.9,1:51.1,2:52.3,3:53.4,4:54.4,5:55.3,6:56.2,8:57.6,10:59.1,12:60.3,16:63.0};
const WHO_H_MONTHS= {0:49.9,1:54.7,2:58.4,3:61.4,4:63.9,5:65.9,6:67.6};
const WHO_HC_WEEKS= {0:34.5,1:35.1,2:35.6,3:36.1,4:36.6,5:37.0,6:37.4,8:38.1,10:38.8,12:39.4,16:40.6};
const WHO_HC_MONTHS={0:34.5,1:37.3,2:39.1,3:40.5,4:41.6,5:42.6,6:43.3};

// Approximate percentile bands relative to 50th; scaling factors from WHO SD tables
const PCT_BANDS = [
  { label:"97th+",  wkFactor:1.135, moFactor:1.120 },
  { label:"75th–97th", wkFactor:1.068, moFactor:1.060 },
  { label:"50th–75th", wkFactor:1.000, moFactor:1.000 },
  { label:"25th–50th", wkFactor:0.932, moFactor:0.940 },
  { label:"10th–25th", wkFactor:0.875, moFactor:0.882 },
  { label:"below 10th",wkFactor:0,    moFactor:0     },
];

function interpolateWHO(table, age) {
  const keys = Object.keys(table).map(Number).sort((a,b)=>a-b);
  if (age <= keys[0]) return table[keys[0]];
  if (age >= keys[keys.length-1]) return table[keys[keys.length-1]];
  const lo = keys.filter(k=>k<=age).pop();
  const hi = keys.filter(k=>k>age)[0];
  const t = (age-lo)/(hi-lo);
  return table[lo] + t*(table[hi]-table[lo]);
}

// Fix 15: single percentile value (not range) via ratio mapping
function getPctSingle(val, who50) {
  const ratio = val / who50;
  if (ratio >= 1.15) return "75th";
  if (ratio >= 1.07) return "65th";
  if (ratio >= 1.00) return "50th";
  if (ratio >= 0.93) return "42nd";
  if (ratio >= 0.86) return "35th";
  if (ratio >= 0.79) return "25th";
  if (ratio >= 0.72) return "15th";
  return "10th";
}

function ordinalSuffix(n) {
  const s = String(n);
  if (s.endsWith("11")||s.endsWith("12")||s.endsWith("13")) return "th";
  if (s.endsWith("1")) return "st";
  if (s.endsWith("2")) return "nd";
  if (s.endsWith("3")) return "rd";
  return "th";
}

// Fix 10+15: computePercentiles takes live latest measurements from state
function computePercentiles(ageMode, age, corr, latestW, latestH, latestHC) {
  if (ageMode === "corrected") {
    const corrWeeks = corr.weeks;
    const w50  = interpolateWHO(WHO_W_WEEKS,  corrWeeks);
    const h50  = interpolateWHO(WHO_H_WEEKS,  corrWeeks);
    const hc50 = interpolateWHO(WHO_HC_WEEKS, corrWeeks);
    return {
      weight: { pct: getPctSingle(latestW,  w50),  val: `${latestW.toFixed(2)} kg · corrected`,  ref: w50.toFixed(2)+"kg 50th" },
      height: { pct: getPctSingle(latestH,  h50),  val: `${latestH.toFixed(1)} cm · corrected`,  ref: h50.toFixed(1)+"cm 50th" },
      hc:     { pct: getPctSingle(latestHC, hc50), val: `${latestHC.toFixed(1)} cm · corrected`, ref: hc50.toFixed(1)+"cm 50th" },
    };
  } else {
    const chronoMonths = age.months;
    const w50  = interpolateWHO(WHO_W_MONTHS,  chronoMonths);
    const h50  = interpolateWHO(WHO_H_MONTHS,  chronoMonths);
    const hc50 = interpolateWHO(WHO_HC_MONTHS, chronoMonths);
    return {
      weight: { pct: getPctSingle(latestW,  w50),  val: `${latestW.toFixed(2)} kg · chrono`,  ref: w50.toFixed(2)+"kg 50th" },
      height: { pct: getPctSingle(latestH,  h50),  val: `${latestH.toFixed(1)} cm · chrono`,  ref: h50.toFixed(1)+"cm 50th" },
      hc:     { pct: getPctSingle(latestHC, hc50), val: `${latestHC.toFixed(1)} cm · chrono`, ref: hc50.toFixed(1)+"cm 50th" },
    };
  }
}

// Fix 11: velocity from weight-only entries sorted by date
function computeVelocity(weightData) {
  const sorted = [...weightData].filter(d=>d.weight && d.dateObj)
    .sort((a,b)=>a.dateObj-b.dateObj);
  if (sorted.length < 2) return null; // null = insufficient data
  if (sorted.length >= 2) {
    const a = sorted[sorted.length-2];
    const b = sorted[sorted.length-1];
    if (b.weight === a.weight) return 0;
    const days = Math.max(1,(b.dateObj-a.dateObj)/86400000);
    return Math.round(((b.weight-a.weight)*1000)/days);
  }
  return null;
}

// Build chart data with proper WHO reference lines
function buildChartData(type, allData) {
  const age  = getChronologicalAge();
  const corr = getCorrectedAge();

  if (type === "weight") {
    const pts = allData.filter(d=>d.weight && d.dateObj)
      .sort((a,b)=>a.dateObj-b.dateObj);
    return pts.map(d => {
      const ageAtPt = (d.dateObj - DOB) / (86400000 * 30.44); // months
      const corrWksAtPt = Math.max(0, (d.dateObj - EDD) / (86400000 * 7));
      return {
        name: d.date,
        maanvik: d.weight,
        chrono: parseFloat(interpolateWHO(WHO_W_MONTHS, ageAtPt).toFixed(2)),
        corr:   parseFloat(interpolateWHO(WHO_W_WEEKS,  corrWksAtPt).toFixed(2)),
      };
    });
  }
  if (type === "height") {
    const pts = allData.filter(d=>d.height && d.dateObj)
      .sort((a,b)=>a.dateObj-b.dateObj);
    return pts.map(d => {
      const ageAtPt = (d.dateObj - DOB) / (86400000 * 30.44);
      const corrWksAtPt = Math.max(0, (d.dateObj - EDD) / (86400000 * 7));
      return {
        name: d.date,
        maanvik: d.height,
        chrono: parseFloat(interpolateWHO(WHO_H_MONTHS, ageAtPt).toFixed(1)),
        corr:   parseFloat(interpolateWHO(WHO_H_WEEKS,  corrWksAtPt).toFixed(1)),
      };
    });
  }
  if (type === "hc") {
    const pts = allData.filter(d=>d.hc && d.dateObj)
      .sort((a,b)=>a.dateObj-b.dateObj);
    return pts.map(d => {
      const ageAtPt = (d.dateObj - DOB) / (86400000 * 30.44);
      const corrWksAtPt = Math.max(0, (d.dateObj - EDD) / (86400000 * 7));
      return {
        name: d.date,
        maanvik: d.hc,
        chrono: parseFloat(interpolateWHO(WHO_HC_MONTHS, ageAtPt).toFixed(1)),
        corr:   parseFloat(interpolateWHO(WHO_HC_WEEKS,  corrWksAtPt).toFixed(1)),
      };
    });
  }
  return [];
}

  const [logs,       setLogs]      = useState(INITIAL_LOGS_DATA);
  const [extras,     setExtras]    = useState([]);
  const [toast,      setToast]     = useState(null);
  const [voice,      setVoice]     = useState(false);
  const [voiceSheet, setVoiceSheet]= useState(null);
  const [clinicNum,  setClinicNum] = useState(""); // shared across Today + Health

  const showToast = useCallback(m=>setToast(m),[]);
  const onLog     = useCallback(e=>setLogs(p=>[...p,{...e,_id:`l${Date.now()}`,_ts:Date.now(),_relTime:"just now"}]),[]);
  const onDelete  = useCallback(id=>setLogs(p=>p.filter(l=>l._id!==id)),[]);
  const onMeasure = useCallback(m=>setExtras(p=>[...p,m]),[]);
  const openSheet = useCallback(type=>{ setVoice(false); setTimeout(()=>setVoiceSheet(type),200); },[]);

  const nav = [
    {id:"today",   icon:"🏠", label:"Today"},
    {id:"growth",  icon:"📈", label:"Growth"},
    {id:"health",  icon:"🩺", label:"Health"},
    {id:"memories",icon:"📸", label:"Memories"},
  ];

  // SVG waveform icon for FAB (Change E)
  const WaveformIcon = () => (
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="2"  y="8"  width="3" height="6"  rx="1.5" fill="white"/>
      <rect x="7"  y="4"  width="3" height="14" rx="1.5" fill="white"/>
      <rect x="12" y="6"  width="3" height="10" rx="1.5" fill="white"/>
      <rect x="17" y="9"  width="3" height="4"  rx="1.5" fill="white"/>
    </svg>
  );

  return (
    <div style={{ background:"#FDFCFA", minHeight:"100vh", display:"flex", justifyContent:"center" }}>
      <div style={{ width:"100%", maxWidth:430, minHeight:"100vh", display:"flex", flexDirection:"column", position:"relative" }}>

        {/* screen content */}
        <div style={{ flex:1, overflowY:"auto", padding:"20px 16px 90px" }}>
          {tab==="today"    && <TodayScreen   logs={logs} onLog={onLog} onDeleteLog={onDelete} showToast={showToast} clinicNum={clinicNum} setClinicNum={setClinicNum}/>}
          {tab==="growth"   && <GrowthScreen  extraMeasurements={extras} onAddMeasurement={onMeasure} showToast={showToast}/>}
          {tab==="health"   && <HealthScreen  showToast={showToast} clinicNum={clinicNum} setClinicNum={setClinicNum}/>}
          {tab==="memories" && <MemoriesScreen showToast={showToast}/>}
        </div>

        {/* Change E: SVG waveform FAB with ring pulse */}
        <button onClick={()=>setVoice(true)} style={{
          position:"fixed", bottom:80, right:"max(16px, calc(50% - 199px))",
          width:56, height:56, borderRadius:"50%", background:"#7C9A7E", border:"none",
          cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center",
          zIndex:300, animation:"ringPulse 2.8s ease infinite"
        }}>
          <WaveformIcon/>
        </button>

        {/* Pre-filled sheet opened from voice parsing (Change F) */}
        {voiceSheet && (
          <BottomSheet open={true} onClose={()=>setVoiceSheet(null)} title={
            voiceSheet==="feed"?"🍼 Log Feed":voiceSheet==="sleep"?"💤 Log Sleep":voiceSheet==="diaper"?"🩲 Log Diaper":voiceSheet==="weight"?"⚖️ Log Weight":"💊 Log Medicine"
          }>
            {voiceSheet==="feed"   && <FeedForm   onSave={l=>{ onLog(l); setVoiceSheet(null); showToast("Feed logged 🍼"); }}/>}
            {voiceSheet==="sleep"  && <SleepForm  onSave={l=>{ onLog(l); setVoiceSheet(null); showToast("Sleep logged 💤"); }}/>}
            {voiceSheet==="diaper" && <DiaperForm onSave={l=>{ onLog(l); setVoiceSheet(null); showToast("Diaper logged 🩲"); }}/>}
            {voiceSheet==="weight" && <WeightForm onSave={l=>{ onLog(l); setVoiceSheet(null); showToast("Weight logged ⚖️"); }}/>}
            {voiceSheet==="med"    && <MedForm    onSave={l=>{ onLog(l); setVoiceSheet(null); showToast("Medicine logged 💊"); }}/>}
          </BottomSheet>
        )}

        {/* bottom nav */}
        <div style={{
          position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)",
          width:"100%", maxWidth:430, height:64,
          background:"#fff", borderTop:"1px solid #f0f0f0",
          display:"flex", zIndex:200,
          boxShadow:"0 -2px 16px rgba(0,0,0,0.04)"
        }}>
          {nav.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{
              flex:1, background:"none", border:"none", cursor:"pointer",
              display:"flex", flexDirection:"column", alignItems:"center",
              justifyContent:"center", gap:3, padding:0, transition:"all 0.15s"
            }}>
              <span style={{ fontSize:20, filter:tab===t.id?"none":"grayscale(1) opacity(0.45)", transition:"filter 0.15s" }}>{t.icon}</span>
              <span style={{ fontSize:10, fontWeight:700, color:tab===t.id?"#7C9A7E":"#8C9BAB" }}>{t.label}</span>
            </button>
          ))}
        </div>

        {voice && <VoiceLog onClose={()=>setVoice(false)} onLog={onLog} logs={logs} showToast={showToast} openSheet={openSheet}/>}
        {toast && <Toast message={toast} onDone={()=>setToast(null)}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
