const EDD = new Date("2026-02-15");

function getChronologicalAge() {
  const today = new Date();
  const diff = today - DOB;
  const totalDays = Math.floor(diff / 86400000);
  const months = Math.floor(totalDays / 30.44);
  const days = Math.floor(totalDays - months * 30.44);
  return { months, days, totalDays };
}

function getCorrectedAge() {
  const today = new Date();
  const diff = today - EDD;
  if (diff < 0) return { weeks: 0, days: 0, totalDays: 0 };
  const totalDays = Math.floor(diff / 86400000);
  const weeks = Math.floor(totalDays / 7);
  const days = totalDays % 7;
  return { weeks, days, totalDays };
}

// ─── AUDIO ENGINE ─────────────────────────────────────────
function useAudioEngine() {
  const ctx    = useRef(null);
  const nodes  = useRef({});
  const timer  = useRef(null);
  const [playing, setPlaying] = useState(null);

  const getCtx = () => {
    if (!ctx.current) ctx.current = new (window.AudioContext || window.webkitAudioContext)();
    return ctx.current;
  };

  const stopAll = useCallback(() => {
    const n = nodes.current;
    if (n.src)      { try { n.src.stop(); } catch{} }
    if (n.osc)      { try { n.osc.stop(); } catch{} }
    if (n.interval) clearInterval(n.interval);
    nodes.current = {};
    setPlaying(null);
    if (timer.current) clearTimeout(timer.current);
  }, []);

  const playSound = useCallback((type) => {
    if (playing === type) { stopAll(); return; }
    stopAll();
    const ac = getCtx();
    if (ac.state === "suspended") ac.resume();

    const master = ac.createGain();
    master.gain.setValueAtTime(0.4, ac.currentTime);
    master.connect(ac.destination);

    const makeNoise = (freq, q, btype) => {
      const sz = ac.sampleRate * 3;
      const buf = ac.createBuffer(1, sz, ac.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < sz; i++) d[i] = Math.random() * 2 - 1;
      const src = ac.createBufferSource();
      src.buffer = buf; src.loop = true;
      if (freq) {
        const f = ac.createBiquadFilter();
        f.type = btype || "lowpass"; f.frequency.value = freq;
        if (q) f.Q.value = q;
        src.connect(f); f.connect(master);
      } else { src.connect(master); }
      src.start();
      nodes.current.src = src;
    };

    if (type === "white")     makeNoise(null);
    else if (type === "rain") makeNoise(600);
    else if (type === "ocean") makeNoise(320);
    else if (type === "fan")  makeNoise(900, 0.4, "bandpass");
    else if (type === "heartbeat") {
      const osc = ac.createOscillator();
      const g   = ac.createGain();
      osc.frequency.value = 72;
      g.gain.setValueAtTime(0, ac.currentTime);
      osc.connect(g); g.connect(master); osc.start();
      const beat = () => {
        const t = ac.currentTime;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(1,   t+0.05);
        g.gain.linearRampToValueAtTime(0,   t+0.15);
        g.gain.linearRampToValueAtTime(0.7, t+0.25);
        g.gain.linearRampToValueAtTime(0,   t+0.4);
      };
      beat();
      nodes.current.osc = osc;
      nodes.current.interval = setInterval(beat, 1000);
    }
    nodes.current.master = master;
    setPlaying(type);
    timer.current = setTimeout(stopAll, 600000);
  }, [playing, stopAll]);

  const setVolume = useCallback((v) => {
    if (nodes.current.master) {
      const ac = getCtx();
      nodes.current.master.gain.setValueAtTime(v, ac.currentTime);
    }
  }, []);

  return { playing, playSound, setVolume };
}

// ─── VOICE LOG ────────────────────────────────────────────
function VoiceLog({ onClose, onLog, showToast }) {
  const [status,     setStatus]     = useState("listening");
  const [transcript, setTranscript] = useState("");
  const [parsed,     setParsed]     = useState(null);
  const [hint,       setHint]       = useState(0);
  const recRef = useRef(null);
  const hints = [
    "Try: \"Fed Maanvik 55ml breastmilk\"",
    "Try: \"Diaper change, wet\"",
    "Try: \"Maanvik slept 2 hours, settled\"",
  ];

  useEffect(() => {
    const t = setInterval(()=>setHint(h=>(h+1)%hints.length), 2500);
    return ()=>clearInterval(t);
  },[]);

  useEffect(() => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { setStatus("unsupported"); return; }
    const r = new SR();
    r.continuous = false; r.interimResults = true; r.lang = "en-IN";
    r.onresult = e => {
      const t = Array.from(e.results).map(r=>r[0].transcript).join(" ");
      setTranscript(t);
      if (e.results[0].isFinal) { setStatus("processing"); parseVoice(t); }
    };
    r.onerror = ()=>setStatus("error");
    recRef.current = r;
    r.start();
    return ()=>{ try { r.stop(); } catch{} };
  },[]);

  const parseVoice = t => {
    const l = t.toLowerCase();
    let result = null;
    if (/fed|feed|milk|breastmilk|formula/.test(l)) {
      const ml = l.match(/(\d+)\s*ml/)?.[1] || "55";
      const ft = /formula/.test(l) ? "formula" : "breastmilk";
      result = { type:"feed", feedType:ft, volume:ml, display:`🍼 Feed — ${ml}ml, ${ft==="breastmilk"?"Breastmilk":"Formula"}` };
    } else if (/sleep|slept|nap/.test(l)) {
      const hrs = l.match(/(\d+)\s*hour/)?.[1] || "1";
      result = { type:"sleep", start:"12:00", end:`${String(12+parseInt(hrs)).padStart(2,"0")}:00`, quality:"settled", display:`💤 Sleep — ${hrs}hr` };
    } else if (/diaper|nappy|wet|soiled|poop/.test(l)) {
      const dt = /soiled|poop/.test(l) ? "soiled" : "wet";
      result = { type:"diaper", diaperType:dt, display:`🩲 Diaper — ${dt}` };
    } else if (/weight|weigh/.test(l)) {
      const kg = l.match(/(\d+\.?\d*)\s*kg/)?.[1] || "";
      result = { type:"weight", value:kg, display:`⚖️ Weight — ${kg}kg` };
    } else if (/medicine|vitamin|iron|calcium/.test(l)) {
      result = { type:"med", medId:"vd3", medName:"Vitamin D3", display:"💊 Medication logged" };
    }
    if (result) { setParsed(result); setStatus("preview"); }
    else setStatus("unparseable");
  };

  const overlayStyle = { position:"fixed", inset:0, background:"rgba(20,28,38,0.93)", zIndex:2000,
    display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center",
    backdropFilter:"blur(8px)" };

  return (
    <div style={overlayStyle}>
      <button onClick={onClose} style={{ position:"absolute", top:24, right:24, background:"rgba(255,255,255,0.15)", border:"none", borderRadius:"50%", width:40, height:40, color:"#fff", fontSize:18, cursor:"pointer" }}>✕</button>
      {status==="listening" && <>
        <div style={{ display:"flex", alignItems:"flex-end", gap:4, height:60, marginBottom:28 }}>
          {[...Array(12)].map((_,i)=>(
            <div key={i} style={{ width:4, borderRadius:4, background:"#7C9A7E",
              animation:`waveBar 0.8s ease infinite`, animationDelay:`${i*0.07}s` }}/>
          ))}
        </div>
        <div style={{ color:"#fff", fontSize:20, fontWeight:700, marginBottom:12 }}>Listening...</div>
        <div style={{ color:"rgba(255,255,255,0.55)", fontSize:13, maxWidth:260, textAlign:"center" }}>{hints[hint]}</div>
        {transcript && <div style={{ marginTop:20, color:"rgba(255,255,255,0.9)", fontSize:16, fontStyle:"italic" }}>"{transcript}"</div>}
      </>}
      {status==="processing" && <div style={{ color:"#fff", fontSize:16 }}>Processing... 🌿</div>}
      {status==="preview" && parsed && (
        <div className="pop-enter" style={{ background:"#fff", borderRadius:20, padding:24, maxWidth:320, width:"90%", textAlign:"center" }}>
          <div style={{ fontSize:13, color:"#8C9BAB", marginBottom:8 }}>I heard:</div>
          <div style={{ fontSize:20, fontWeight:700, color:"#2C3E50", marginBottom:18 }}>{parsed.display}</div>
          <div style={{ fontSize:13, color:"#8C9BAB", marginBottom:14 }}>Does this look right?</div>
          <div style={{ display:"flex", gap:10 }}>
            <button onClick={()=>{ onLog(parsed); showToast("Logged! 🌿"); onClose(); }} style={{ ...S.saveBtn, flex:1, marginTop:0 }}>Confirm ✓</button>
            <button onClick={onClose} style={{ flex:1, background:"#f5f5f5", color:"#2C3E50", border:"none", borderRadius:24, padding:"15px", fontSize:14, fontWeight:600, cursor:"pointer" }}>Edit</button>
          </div>
        </div>
      )}
      {(status==="unparseable"||status==="error") && (
        <div style={{ color:"#fff", textAlign:"center", padding:24 }}>
          <div style={{ fontSize:44, marginBottom:14 }}>🤔</div>
          <div style={{ fontSize:16, marginBottom:20 }}>I didn't quite catch that</div>
          <button onClick={onClose} style={{ background:"#7C9A7E", color:"#fff", border:"none", borderRadius:24, padding:"12px 28px", cursor:"pointer", fontWeight:700 }}>Log manually</button>
        </div>
      )}
      {status==="unsupported" && (
        <div style={{ color:"#fff", textAlign:"center", padding:24 }}>
          <div style={{ fontSize:44, marginBottom:14 }}>🎙</div>
          <div style={{ fontSize:16, marginBottom:4 }}>Voice not supported in this browser</div>
          <div style={{ fontSize:13, color:"rgba(255,255,255,0.5)", marginBottom:20 }}>Try Chrome on Android</div>
          <button onClick={onClose} style={{ background:"#7C9A7E", color:"#fff", border:"none", borderRadius:24, padding:"12px 28px", cursor:"pointer", fontWeight:700 }}>Close</button>
        </div>
      )}
    </div>
  );
}

                 : hour>=12&&hour<17 ? "Good afternoon, Maanvik's Dad 🌤"

  const totalMl = feeds.reduce((s,f)=>s+(parseFloat(f.volume)||0),0);

    if(sl.end==="now") return s+60;
    const [sh,sm]=sl.start.split(":").map(Number);
    const [eh,em]=sl.end.split(":").map(Number);
    return s+Math.max(0,(eh*60+em)-(sh*60+sm));
  },0);
  const sleepHrs = totalSleepMin/60;
  const feedPct   = Math.min(100,Math.round((totalMl/560)*100));
  const sleepPct  = Math.min(100,Math.round((sleepHrs/14)*100));
  const diaperPct = Math.min(100,Math.round((diapers.length/6)*100));
  const medPct    = Math.min(100,Math.round((meds.length/6)*100));
  const allGreen  = feedPct>=100 && sleepPct>=100 && diaperPct>=100 && medPct>=100;

  useEffect(()=>{ if(allGreen){ setConfetti(true); setTimeout(()=>setConfetti(false),3200); } },[allGreen]);

    const msg = `Feeds: ${totalMl}ml (${feeds.length} sessions). Sleep: ${sleepHrs.toFixed(1)}hrs. Diapers: ${diapers.length}. Meds: ${meds.length}.`;

    callNestiAI(sys, msg, fb).then(r=>{ setObsText(r); setObsLoading(false); });
  },[]);

  const nudge = (()=>{
    const lf = feeds[feeds.length-1];

    if(meds.length<1) return { icon:"💊", text:"A medicine dose hasn't been logged today 💊", action:"med" };
    return null;

// ─── SCREEN 2: GROWTH ────────────────────────────────────
function GrowthScreen({ extraMeasurements, onAddMeasurement }) {
  const [tab,         setTab]       = useState("weight");
  const [ageMode,     setAgeMode]   = useState("corrected");
  const [addSheet,    setAddSheet]  = useState(false);
  const [nW,setNW]=useState(""); const [nH,setNH]=useState(""); const [nHC,setNHC]=useState(""); const [nD,setND]=useState(new Date().toISOString().slice(0,10));
  const [milestones,  setMs]        = useState({});
  const [confetti,    setConfetti]  = useState(false);
  const [msSheet,     setMsSheet]   = useState(null);
  const [msDate,      setMsDate]    = useState(""); const [msNote,setMsNote]=useState("");

  const allData = [...GROWTH_DATA, ...extraMeasurements];

  const whoRef50   = [{name:"0m",v:3.3},{name:"1m",v:4.5},{name:"2m",v:5.6},{name:"3m",v:6.4},{name:"4m",v:7.0}];
  const fentonRef50 = [{name:"30w",v:1.34},{name:"32w",v:1.78},{name:"34w",v:2.27},{name:"36w",v:2.74},{name:"38w",v:3.18},{name:"40w",v:3.53},{name:"42w",v:3.90},{name:"44w",v:4.20},{name:"48w",v:4.90}];

  const weightData = allData.filter(d=>d.weight).map((d,i)=>({
    name:d.date, maanvik:d.weight,
    chrono: whoRef50[Math.min(i,whoRef50.length-1)]?.v,
    corr:   fentonRef50[Math.min(i+2,fentonRef50.length-1)]?.v
  }));
  const heightData = allData.filter(d=>d.height).map((d,i)=>({ name:d.date, maanvik:d.height, who50:[45,48,53,55,57,59][i]||59 }));
  const hcData     = allData.filter(d=>d.hc).map((d,i)=>({ name:d.date, maanvik:d.hc,    who50:[34,35,36,37,38][i]||37 }));

  const pctData = ageMode==="corrected"
    ? { weight:{pct:"42nd",val:"4.45 kg · corrected",trend:"↑ catching up"},
        height:{pct:"75th",val:"59 cm · corrected",  trend:"↑ above median"},
        hc:    {pct:"65th",val:"37 cm · corrected",  trend:"↑ tracking well"} }
    : { weight:{pct:"25th",val:"4.70 kg · chrono",   trend:"↑ catching up"},
        height:{pct:"88th",val:"59 cm · chrono",     trend:"↑ above median"},
        hc:    {pct:"50th",val:"37 cm · chrono",     trend:"↑ on track"} };

  const lastTwo = allData.filter(d=>d.weight).slice(-2);
  const velG = lastTwo.length===2 ? Math.round(((lastTwo[1].weight-lastTwo[0].weight)*1000)/Math.max(1,(lastTwo[1].dateObj-lastTwo[0].dateObj)/86400000)) : 33;
  const velColor = velG>=20&&velG<=35?"#7C9A7E":velG>35?"#F5A623":"#E05C5C";

  const chartData = tab==="weight" ? weightData : tab==="height" ? heightData : hcData;

  return (
    <div style={{ paddingBottom:20 }}>
      <Confetti active={confetti}/>
      <div style={{ fontSize:20, fontWeight:800, color:"#2C3E50", marginBottom:16 }}>Maanvik's growth 📈</div>

      <div style={{ display:"flex", gap:4, marginBottom:14, background:"#f0f0f0", borderRadius:50, padding:4 }}>
        {[["corrected","Corrected age"],["chrono","Chronological"]].map(([v,l])=>(
          <button key={v} onClick={()=>setAgeMode(v)} style={{ flex:1, background:ageMode===v?"#fff":"transparent", color:ageMode===v?"#2C3E50":"#8C9BAB", border:"none", borderRadius:50, padding:"8px", fontSize:13, fontWeight:700, cursor:"pointer", boxShadow:ageMode===v?"0 1px 6px rgba(0,0,0,0.1)":"none", transition:"all 0.2s" }}>{l}</button>
        ))}
      </div>

      <div style={{ display:"grid", gridTemplateColumns:"repeat(3,1fr)", gap:8, marginBottom:16 }}>
        {[["Weight","weight"],["Height","height"],["Head","hc"]].map(([l,k])=>(
          <div key={k} style={{ ...S.card, textAlign:"center", padding:"14px 8px" }}>
            <div style={{ fontSize:26, fontWeight:900, color:"#7C9A7E" }}>{pctData[k].pct}</div>
            <div style={{ fontSize:9, color:"#8C9BAB", textTransform:"uppercase", letterSpacing:"0.04em" }}>percentile</div>
            <div style={{ fontSize:11, fontWeight:700, color:"#2C3E50", marginTop:4 }}>{l}</div>
            <div style={{ fontSize:10, color:"#8C9BAB", marginTop:2 }}>{pctData[k].val}</div>
            <div style={{ fontSize:10, color:"#7C9A7E", marginTop:4, fontWeight:600 }}>{pctData[k].trend}</div>
          </div>
        ))}
      </div>

      <div style={{ background:"#f0f7f0", borderRadius:14, padding:"12px 14px", marginBottom:14, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
        <div>
          <div style={{ fontSize:12, color:"#8C9BAB", fontWeight:600 }}>Recent velocity</div>
          <div style={{ fontSize:22, fontWeight:900, color:velColor }}>~{velG}g/day</div>
        </div>
        <div style={{ textAlign:"right" }}>
          <div style={{ background:velColor+"22", color:velColor, borderRadius:50, padding:"4px 12px", fontSize:11, fontWeight:700 }}>
            {velG>=20&&velG<=35?"✓ On target":velG>35?"⚠ Above":"⚠ Below target"}
          </div>
          <div style={{ fontSize:10, color:"#8C9BAB", marginTop:4 }}>Target: 20–35 g/day</div>
        </div>
      </div>

      <div style={{ display:"flex", gap:6, marginBottom:10 }}>
        {[["weight","⚖️ Weight"],["height","📏 Height"],["hc","🔵 Head"]].map(([v,l])=>(
          <button key={v} onClick={()=>setTab(v)} style={{ flex:1, background:tab===v?"#7C9A7E":"#f5f5f5", color:tab===v?"#fff":"#8C9BAB", border:"none", borderRadius:50, padding:"8px 4px", fontSize:12, fontWeight:700, cursor:"pointer" }}>{l}</button>
        ))}
      </div>

      <div style={{ ...S.card, padding:"14px 6px", marginBottom:14 }}>
        <ResponsiveContainer width="100%" height={210}>
          <LineChart data={chartData} margin={{ top:8, right:14, left:-20, bottom:4 }}>
            <CartesianGrid strokeDasharray="3 3" stroke="#f0f0f0"/>
            <XAxis dataKey="name" tick={{ fontSize:9, fill:"#8C9BAB" }}/>
            <YAxis tick={{ fontSize:9, fill:"#8C9BAB" }}/>
            <Tooltip contentStyle={{ borderRadius:12, border:"none", boxShadow:"0 4px 20px rgba(0,0,0,0.1)", fontSize:12 }}/>
            <Legend wrapperStyle={{ fontSize:10 }}/>
            <Line type="monotone" dataKey="maanvik" stroke="#7C9A7E" strokeWidth={3} dot={{ r:5, fill:"#7C9A7E", strokeWidth:0 }} name="Maanvik"/>
            <Line type="monotone" dataKey={tab==="weight"?"chrono":"who50"} stroke="#ccc" strokeDasharray="5 5" strokeWidth={1.5} dot={false} name="WHO 50th (chrono)"/>
            {tab==="weight" && <Line type="monotone" dataKey="corr" stroke="#E8967A" strokeDasharray="3 3" strokeWidth={1.5} dot={false} name="WHO 50th (corrected)"/>}
          </LineChart>
        </ResponsiveContainer>
      </div>

      <button onClick={()=>setAddSheet(true)} style={{ ...S.saveBtn, marginBottom:16 }}>+ Add Measurement</button>

      <div style={S.secLabel}>developmental milestones</div>
      <div style={{ display:"flex", flexDirection:"column", gap:8, marginBottom:16 }}>
        {MILESTONE_DATA.map(m=>(
          <div key={m.id} style={{ ...S.card, display:"flex", alignItems:"center", gap:12, padding:"12px 16px" }}>
            <span style={{ fontSize:22 }}>{m.icon}</span>
            <div style={{ flex:1 }}>
              <div style={{ fontWeight:600, fontSize:14, color:milestones[m.id]?"#7C9A7E":"#2C3E50" }}>{m.label}</div>
              <div style={{ fontSize:11, color:"#8C9BAB" }}>{milestones[m.id]?`✓ Observed ${milestones[m.id].date}`:m.ageLabel}</div>
            </div>
            <button onClick={()=>{ if(milestones[m.id]) return; setMsSheet(m); setMsDate(""); setMsNote(""); }}
              style={{ background:milestones[m.id]?"#f0f7f0":"#f5f5f5", color:milestones[m.id]?"#7C9A7E":"#2C3E50", border:"none", borderRadius:50, padding:"6px 14px", fontSize:12, fontWeight:700, cursor:milestones[m.id]?"default":"pointer" }}>
              {milestones[m.id]?"🎉":"Mark"}
            </button>
          </div>
        ))}
      </div>

      <BottomSheet open={addSheet} onClose={()=>setAddSheet(false)} title="+ Add Measurement">
        <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
          <div><div style={S.label}>Date</div><input type="date" value={nD} onChange={e=>setND(e.target.value)} style={S.input}/></div>
          <div><div style={S.label}>Weight (kg)</div><input type="number" step="0.01" value={nW} onChange={e=>setNW(e.target.value)} placeholder="e.g. 4.80" style={S.input}/></div>
          <div><div style={S.label}>Height (cm)</div><input type="number" step="0.1" value={nH} onChange={e=>setNH(e.target.value)} placeholder="e.g. 60" style={S.input}/></div>
          <div><div style={S.label}>Head Circumference (cm)</div><input type="number" step="0.1" value={nHC} onChange={e=>setNHC(e.target.value)} placeholder="e.g. 38" style={S.input}/></div>
          <button onClick={()=>{ onAddMeasurement({ date:new Date(nD).toLocaleDateString("en-IN",{day:"numeric",month:"short"}), dateObj:new Date(nD), weight:parseFloat(nW)||null, height:parseFloat(nH)||null, hc:parseFloat(nHC)||null }); setAddSheet(false); setNW(""); setNH(""); setNHC(""); }} style={S.saveBtn}>Save Measurement ✓</button>
        </div>
      </BottomSheet>

      <BottomSheet open={!!msSheet} onClose={()=>setMsSheet(null)} title={`🎉 ${msSheet?.label}`}>
        <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
          <div><div style={S.label}>Date observed</div><input type="date" value={msDate} onChange={e=>setMsDate(e.target.value)} style={S.input}/></div>
          <div><div style={S.label}>Note (optional)</div><input type="text" value={msNote} onChange={e=>setMsNote(e.target.value)} placeholder="e.g. at morning feeding" style={S.input}/></div>
          <button onClick={()=>{ setMs(prev=>({...prev,[msSheet.id]:{date:msDate||"today",note:msNote}})); setMsSheet(null); setConfetti(true); setTimeout(()=>setConfetti(false),3200); }} style={S.saveBtn}>Mark as Observed 🎉</button>
        </div>
      </BottomSheet>
    </div>
  );
}

  const gradients = [
    "linear-gradient(135deg,#7C9A7E,#a8c5aa)",
    "linear-gradient(135deg,#E8967A,#f4b89a)",
    "linear-gradient(135deg,#6bb5d6,#9dd0e8)",
    "linear-gradient(135deg,#c67ad4,#daa3e2)",
    "linear-gradient(135deg,#F5A623,#f9c574)",
  ];

  return (
    <div style={{ paddingBottom:20 }}>
      <div style={{ fontSize:20, fontWeight:800, color:"#2C3E50", marginBottom:16 }}>Maanvik's moments 📸</div>
      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10 }}>
        {memories.map((m,i)=>(
          <div key={m.id} onClick={()=>{ if(!m.prompt) setExpanded(m); else setAddSheet(true); }}
            style={{ borderRadius:16, overflow:"hidden", boxShadow:"0 2px 16px rgba(0,0,0,0.08)", cursor:"pointer" }}>
            <div style={{ height:120, background:m.gradient||gradients[i%gradients.length], display:"flex", alignItems:"center", justifyContent:"center" }}>
              {m.prompt
                ? <div style={{ textAlign:"center" }}><div style={{ fontSize:26 }}>➕</div><div style={{ fontSize:11, color:"rgba(255,255,255,0.8)", marginTop:4 }}>Add moment</div></div>
                : <div style={{ fontSize:38 }}>{m.title.match(/[\u{1F300}-\u{1FAD6}]/u)?.[0]||"📷"}</div>
              }
            </div>
            <div style={{ background:"#fff", padding:"10px 12px" }}>
              <div style={{ fontWeight:700, fontSize:13, color:"#2C3E50" }}>{m.title}</div>
              <div style={{ fontSize:11, color:"#8C9BAB", marginTop:2 }}>{m.date||"Tap to add"}</div>
            </div>
          </div>
        ))}
      </div>

      {expanded && (
        <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.88)", zIndex:2000, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", animation:"fadeIn 0.2s ease" }}>
          <button onClick={()=>setExpanded(null)} style={{ position:"absolute", top:24, right:24, background:"rgba(255,255,255,0.15)", border:"none", borderRadius:"50%", width:40, height:40, color:"#fff", fontSize:18, cursor:"pointer" }}>✕</button>
          <div style={{ width:"88%", maxWidth:360, background:expanded.gradient||gradients[0], borderRadius:20, height:240, display:"flex", alignItems:"center", justifyContent:"center", fontSize:64, marginBottom:20 }}>
            {expanded.title.match(/[\u{1F300}-\u{1FAD6}]/u)?.[0]||"📷"}
          </div>
          <div style={{ color:"#fff", fontWeight:800, fontSize:19, marginBottom:4 }}>{expanded.title}</div>
          {expanded.caption && <div style={{ color:"rgba(255,255,255,0.7)", fontSize:14, marginBottom:4 }}>{expanded.caption}</div>}
          {expanded.date && <div style={{ color:"rgba(255,255,255,0.5)", fontSize:12, marginBottom:20 }}>{expanded.date}</div>}
          <a href={`https://wa.me/?text=${encodeURIComponent(`${expanded.title} — ${expanded.caption||""} (${expanded.date||""})`)} `} target="_blank" rel="noreferrer"
            style={{ background:"#25D366", color:"#fff", borderRadius:50, padding:"12px 28px", fontWeight:700, fontSize:14, cursor:"pointer", textDecoration:"none" }}>
            Share via WhatsApp 💚
          </a>
        </div>
      )}

      <BottomSheet open={addSheet} onClose={()=>setAddSheet(false)} title="Add a moment 📸">
        <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
          <div><div style={S.label}>Title</div><input type="text" value={nTitle} onChange={e=>setNTitle(e.target.value)} placeholder="e.g. First smile" style={S.input}/></div>
          <div><div style={S.label}>Date</div><input type="date" value={nDate} onChange={e=>setNDate(e.target.value)} style={S.input}/></div>
          <div><div style={S.label}>Caption</div><input type="text" value={nCaption} onChange={e=>setNCaption(e.target.value)} placeholder="Add a caption..." style={S.input}/></div>
          <label style={{ background:"#f5f5f5", borderRadius:12, padding:"12px", textAlign:"center", cursor:"pointer", fontWeight:600, color:"#8C9BAB", fontSize:14 }}>
            📷 Add Photo (optional)<input type="file" accept="image/*" style={{ display:"none" }}/>
          </label>
          <button onClick={()=>{
            setMemories(prev=>[...prev,{ id:Date.now(), title:nTitle||"New moment", date:nDate||null, caption:nCaption, gradient:gradients[prev.length%gradients.length] }]);
            setAddSheet(false); setNTitle(""); setNDate(""); setNCaption("");
            showToast("Moment added 📸");
          }} style={S.saveBtn}>Add to Memories ✓</button>
        </div>
      </BottomSheet>
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────
const INITIAL_LOGS_DATA = [
  { _id:"l1", type:"feed",   feedType:"breastmilk", volume:"55", time:"now", _relTime:"45 mins ago", _ts: Date.now()-45*60000 },
  { _id:"l2", type:"sleep",  start:"08:00", end:"09:20", quality:"settled", _relTime:"2 hrs ago" },
  { _id:"l3", type:"diaper", diaperType:"wet", _relTime:"3 hrs ago" },
  { _id:"l4", type:"feed",   feedType:"breastmilk", volume:"50", time:"now", _relTime:"4.5 hrs ago" },
  { _id:"l5", type:"med",    medId:"vd3", medName:"Vitamin D3 (Calsine P)", time:"now", _relTime:"6 hrs ago" },
  { _id:"l6", type:"sleep",  start:"05:00", end:"07:10", quality:"settled", _relTime:"8 hrs ago" },
];

function App() {
  const [tab,    setTab]    = useState("today");
  const [logs,   setLogs]   = useState(INITIAL_LOGS_DATA);
  const [extras, setExtras] = useState([]);
  const [toast,  setToast]  = useState(null);
  const [voice,  setVoice]  = useState(false);

  const showToast = useCallback(m=>setToast(m),[]);
  const onLog     = useCallback(e=>setLogs(p=>[...p,{...e,_id:`l${Date.now()}`,_ts:Date.now(),_relTime:"just now"}]),[]);
  const onDelete  = useCallback(id=>setLogs(p=>p.filter(l=>l._id!==id)),[]);
  const onMeasure = useCallback(m=>setExtras(p=>[...p,m]),[]);

  const nav = [
    {id:"today",   icon:"🏠", label:"Today"},
    {id:"growth",  icon:"📈", label:"Growth"},
    {id:"health",  icon:"🩺", label:"Health"},
    {id:"memories",icon:"📸", label:"Memories"},
  ];

  return (
    <div style={{ background:"#FDFCFA", minHeight:"100vh", display:"flex", justifyContent:"center" }}>
      <div style={{ width:"100%", maxWidth:430, minHeight:"100vh", display:"flex", flexDirection:"column", position:"relative" }}>

        {/* screen content */}
        <div style={{ flex:1, overflowY:"auto", padding:"20px 16px 90px" }}>
          {tab==="today"    && <TodayScreen   logs={logs} onLog={onLog} onDeleteLog={onDelete} showToast={showToast}/>}
          {tab==="growth"   && <GrowthScreen  extraMeasurements={extras} onAddMeasurement={onMeasure}/>}
          {tab==="health"   && <HealthScreen  showToast={showToast}/>}
          {tab==="memories" && <MemoriesScreen showToast={showToast}/>}
        </div>

        {/* voice fab */}
        <button onClick={()=>setVoice(true)} style={{
          position:"fixed", bottom:78, right:"max(16px, calc(50% - 199px))",
          width:52, height:52, borderRadius:"50%", background:"#7C9A7E", border:"none",
          boxShadow:"0 4px 20px rgba(124,154,126,0.55)", cursor:"pointer",
          display:"flex", alignItems:"center", justifyContent:"center",
          fontSize:22, zIndex:300, color:"#fff", animation:"voicePulse 2.5s ease infinite"
        }}>🎙</button>

        {/* bottom nav */}
        <div style={{
          position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)",
          width:"100%", maxWidth:430, height:64,
          background:"#fff", borderTop:"1px solid #f0f0f0",
          display:"flex", zIndex:200,
          boxShadow:"0 -2px 16px rgba(0,0,0,0.04)"
        }}>
          {nav.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)} style={{
              flex:1, background:"none", border:"none", cursor:"pointer",
              display:"flex", flexDirection:"column", alignItems:"center",
              justifyContent:"center", gap:3, padding:0, transition:"all 0.15s"
            }}>
              <span style={{ fontSize:20, filter:tab===t.id?"none":"grayscale(1) opacity(0.45)", transition:"filter 0.15s" }}>{t.icon}</span>
              <span style={{ fontSize:10, fontWeight:700, color:tab===t.id?"#7C9A7E":"#8C9BAB" }}>{t.label}</span>
            </button>
          ))}
        </div>

        {voice && <VoiceLog onClose={()=>setVoice(false)} onLog={onLog} showToast={showToast}/>}
        {toast && <Toast message={toast} onDone={()=>setToast(null)}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
